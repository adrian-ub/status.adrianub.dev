  logoUrl: https://raw.githubusercontent.com/adrian-ub/status.adrianub.dev/master/assets/icon.svg
  faviconSvg: https://raw.githubusercontent.com/adrian-ub/status.adrianub.dev/master/assets/icon.svg
  name: Adrián UB
  introTitle: "Monitor y página de estado, impulsado completamente por GitHub."
  introMessage: Esta es una página de estado que usa datos en **tiempo real** de nuestro [repositorio de GitHub](https://github.com/adrian-ub/status.adrianub.dev).
  navbar:
    - title: Status
      href: /
    - title: Sitio Web
      href: https://adrianub.dev
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

commitMessages:
  commitAuthorName: "UbLabs[bot]"
  commitAuthorEmail: "92824821+ublabs[bot]@users.noreply.github.com"

